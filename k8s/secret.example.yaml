# =====================================================================
# Bagnoli Monitor – template Secret Kubernetes
# =====================================================================
# NON committare il Secret reale con i valori veri.
# Usare UNO dei due metodi:
#
# A) Imperativo (preferito):
#    kubectl -n bagnoli-monitor create secret generic bagnoli-monitor-secret \
#      --from-literal=DATABASE_URL='postgresql://USER:PASS@HOST:5432/DB' \
#      --from-literal=ADMIN_PASS='CHANGE_ME' \
#      --from-literal=SESSION_SECRET='64_HEX_CHARS'
#
# B) Sealed Secrets / External Secrets:
#    consigliato in produzione per avere il Secret in Git criptato.
# =====================================================================
apiVersion: v1
kind: Secret
metadata:
  name: bagnoli-monitor-secret
  namespace: bagnoli-monitor
  labels:
    app: bagnoli-monitor
type: Opaque
stringData:
  DATABASE_URL: "postgresql://USER:PASSWORD@HOST:5432/DBNAME"
  ADMIN_PASS: "CHANGE_ME"
  SESSION_SECRET: "CHANGE_ME_TO_64_HEX_CHARS"
